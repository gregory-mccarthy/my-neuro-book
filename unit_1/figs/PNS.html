nly in the nucleus of the solitary tract (NTS)","children":[],"payload":{"tag":"h5","lines":"82,83"}},{"content":"Visceral afferents do not map neatly onto sympathetic vs parasympathetic labels","children":[],"payload":{"tag":"h5","lines":"84,85"}}],"payload":{"tag":"h4","lines":"70,71"}},{"content":"Efferent side: the CNS acts back","children":[{"content":"Sympathetic and parasympathetic outputs tune many of the same organs","children":[],"payload":{"tag":"h5","lines":"88,89"}},{"content":"Opposition is usually complementary control, not a simple on/off switch","children":[],"payload":{"tag":"h5","lines":"90,91"}},{"content":"Real behaviors often co-activate both divisions","children":[{"content":"Sexual response: parasympathetic erection/arousal; sympathetic emission/ejaculation","children":[],"payload":{"tag":"h6","lines":"94,95"}},{"content":"Standing up: sympathetic vascular tone prevents a blood-pressure crash","children":[],"payload":{"tag":"h6","lines":"96,97"}},{"content":"Breathing: central rhythm plus autonomic airway and cardiac adjustments","children":[],"payload":{"tag":"h6","lines":"98,99"}}],"payload":{"tag":"h5","lines":"92,93"}}],"payload":{"tag":"h4","lines":"86,87"}},{"content":"Teaching slogans","children":[{"content":"Sympathetic: &#x201c;fight or flight&#x201d; = useful mnemonic, not a definition","children":[],"payload":{"tag":"h5","lines":"102,103"}},{"content":"Parasympathetic: &#x201c;rest and digest&#x201d; / &#x201c;feed and breed&#x201d; = useful mnemonic, not a definition","children":[],"payload":{"tag":"h5","lines":"104,105"}},{"content":"Better framing: both branches continuously tune controlled variables","children":[],"payload":{"tag":"h5","lines":"106,107"}}],"payload":{"tag":"h4","lines":"100,101"}},{"content":"Sympathetic division","children":[{"content":"Functional theme: mobilization and redistribution","children":[{"content":"Prepares the body for exertion, threat, cold, standing, attention, and metabolic demand","children":[ cle and heart flow depend on local metabolism and receptor mix","children":[],"payload":{"tag":"h6","lines":"144,145"}},{"content":"Skin: sweating for thermoregulation; piloerection","children":[],"payload":{"tag":"h6","lines":"146,147"}},{"content":"Gut: usually reduces motility and secretion during acute exertion","children":[],"payload":{"tag":"h6","lines":"148,149"}},{"content":"Bladder: relaxes detrusor; contracts internal sphincter","children":[],"payload":{"tag":"h6","lines":"150,151"}},{"content":"Reproductive system: emission/ejaculation and orgasm-related autonomic patterns","children":[],"payload":{"tag":"h6","lines":"152,153"}},{"content":"Immune organs and marrow: regulates immune-cell trafficking and production","children":[],"payload":{"tag":"h6","lines":"154,155"}}],"payload":{"tag":"h5","lines":"136,137"}},{"content":"Chronic sympathetic load","children":[{"content":"Acute mobilization is adaptive; sustained mobilization can become costly","children":[],"payload":{"tag":"h6","lines":"158,159"}},{"content":"Sleep disruption","children":[],"payload":{"tag":"h6","lines":"160,161"}},{"content":"Appetite and weight dysregulation","children":[],"payload":{"tag":"h6","lines":"162,163"}},{"content":"Constipation or other GI dysmotility","children":[],"payload":{"tag":"h6","lines":"164,165"}},{"content":"Fertility and reproductive suppression","children":[],"payload":{"tag":"h6","lines":"166,167"}},{"content":"Cardiovascular strain and atherosclerotic risk","children":[],"payload":{"tag":"h6","lines":"168,169"}},{"content":"Immune and inflammatory modulation","children":[],"payload":{"tag":"h6","lines":"170,171"}}],"payload":{"tag":"h5","lines":"156,157"}}],"payload":{"tag":"h4","lines":"108,109"}},{"content":"Parasympathetic division","children":[{"content":"Functional theme: maintenance, recovery, and local organ support","children":[{"content":"Promotes digestion, secretion, elimination, sexual arousal, and cardiac slowing","children":[],"payload":{"tag": sis, segmentation, sphincter coordination","children":[],"payload":{"tag":"h6","lines":"272,273"}},{"content":"Secretion: gastric, intestinal, pancreatic, and biliary coordination","children":[],"payload":{"tag":"h6","lines":"274,275"}},{"content":"Absorption and fluid/electrolyte exchange","children":[],"payload":{"tag":"h6","lines":"276,277"}},{"content":"Local blood-flow regulation","children":[],"payload":{"tag":"h6","lines":"278,279"}},{"content":"Enteroendocrine signaling","children":[],"payload":{"tag":"h6","lines":"280,281"}},{"content":"Entero-enteric reflexes: one gut region changes activity in another","children":[],"payload":{"tag":"h6","lines":"282,283"}},{"content":"Defensive GI responses: diarrhea/expulsion; vomiting uses gut signals plus brainstem circuits","children":[],"payload":{"tag":"h6","lines":"284,285"}}],"payload":{"tag":"h5","lines":"270,271"}},{"content":"Communication with the CNS and body","children":[{"content":"Parasympathetic modulation: vagus and pelvic splanchnic nerves","children":[],"payload":{"tag":"h6","lines":"288,289"}},{"content":"Sympathetic modulation: prevertebral ganglia and splanchnic pathways","children":[],"payload":{"tag":"h6","lines":"290,291"}},{"content":"Vagal and spinal afferents report gut state to the brainstem and beyond","children":[],"payload":{"tag":"h6","lines":"292,293"}},{"content":"Hormonal, immune, and microbial-metabolic channels also contribute to the gut&#x2013;brain axis","children":[],"payload":{"tag":"h6","lines":"294,295"}}],"payload":{"tag":"h5","lines":"286,287"}},{"content":"Teaching caution","children":[{"content":"&#x201c;Second brain&#x201d; means local sensing, integration, and motor output","children":[],"payload":{"tag":"h6","lines":"298,299"}},{"content":"It does not mean the gut literally thinks, feels, or controls mood in a simple way","children":[],"payload":{"tag":"h6","lines":"300,301"}}],"payload":{"tag":"h5","lines":"296,297"}}],"payload":{"tag":"h4","lines":"234,235"}}],"payloa
