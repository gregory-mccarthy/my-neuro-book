tes</text><text x="700" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#111111">Closed for later: detailed nuclei, loops, microcircuits, methods</text><rect x="110" y="560" width="240" height="58" rx="14" fill="#eeeeee" stroke="#333333" stroke-width="2"/><text x="230.0" y="597.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#111111">Hypothalamic nuclei</text><rect x="410" y="560" width="240" height="58" rx="14" fill="#eeeeee" stroke="#333333" stroke-width="2"/><text x="530.0" y="597.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#111111">Basal-ganglia loops</text><rect x="710" y="560" width="240" height="58" rx="14" fill="#eeeeee" stroke="#333333" stroke-width="2"/><text x="830.0" y="597.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#111111">Cerebellar circuitry</text><rect x="1010" y="560" width="240" height="58" rx="14" fill="#eeeeee" stroke="#333333" stroke-width="2"/><text x="1130.0" y="597.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#111111">Amygdala nuclei</text><rect x="110" y="650" width="240" height="58" rx="14" fill="#eeeeee" stroke="#333333" stroke-width="2"/><text x="230.0" y="687.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#111111">Hippocampal subfields</text><rect x="410" y="650" width="240" height="58" rx="14" fill="#eeeeee" stroke="#333333" stroke-width="2"/><text x="530.0" y="687.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#111111">Split-brain/language</text><rect x="710" y="650" width="240" height="58" rx="14" fill="#eeeeee" stroke="#333333" stroke-width="2"/><text x="830.0" y="687.0" text-anchor="middle" font-family="Arial, Helv