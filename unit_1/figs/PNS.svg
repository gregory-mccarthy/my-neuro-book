<svg width="100%" height="800px" xmlns="http://www.w3.org/2000/svg" id="mindmap" class="markmap mindmap"><style>.markmap {
  --markmap-max-width: 9999px;
  --markmap-a-color: #0097e6;
  --markmap-a-hover-color: #00a8ff;
  --markmap-code-bg: #f0f0f0;
  --markmap-code-color: #555;
  --markmap-highlight-bg: #ffeaa7;
  --markmap-table-border: 1px solid currentColor;
  --markmap-font: 300 16px/20px sans-serif;
  --markmap-circle-open-bg: #fff;
  --markmap-text-color: #333;
  --markmap-highlight-node-bg: #ff02;

  font: var(--markmap-font);
  color: var(--markmap-text-color);
}

  .markmap-link {
    fill: none;
  }

  .markmap-node &gt; circle {
      cursor: pointer;
    }

  .markmap-foreign {
    display: inline-block;
  }

  .markmap-foreign p {
      margin: 0;
    }

  .markmap-foreign a {
      color: var(--markmap-a-color);
    }

  .markmap-foreign a:hover {
        color: var(--markmap-a-hover-color);
      }

  .markmap-foreign code {
      padding: 0.25em;
      font-size: calc(1em - 2px);
      color: var(--markmap-code-color);
      background-color: var(--markmap-code-bg);
      border-radius: 2px;
    }

  .markmap-foreign pre {
      margin: 0;
    }

  .markmap-foreign pre &gt; code {
        display: block;
      }

  .markmap-foreign del {
      text-decoration: line-through;
    }

  .markmap-foreign em {
      font-style: italic;
    }

  .markmap-foreign strong {
      font-weight: bold;
    }

  .markmap-foreign mark {
      background: var(--markmap-highlight-bg);
    }

  .markmap-foreign table,
    .markmap-foreign th,
    .markmap-foreign td {
      border-collapse: collapse;
      border: var(--markmap-table-border);
    }

  .markmap-foreign img {
      display: inline-block;
    }

  .markmap-foreign svg {
      fill: currentColor;
    }

  .markmap-foreign &gt; div {
      width: var(--markmap-max-width);
      text-align: left;
    }

  .markmap-foreign &gt; div &gt; div {
        display: inline-block;
      }

  .markmap-highlight rect {
    fill: var(--markmap-highlight-node-bg);
  }

.markmap-dark .markmap {
  --markmap-code-bg: #1a1b26;
  --markmap-code-color: #ddd;
  --markmap-circle-open-bg: #444;
  --markmap-text-color: #eee;
}
</style><g transform="translate(10.8125,287.9166564941406) scale(0.8779380341880342)"><path class="markmap-link" data-depth="2" data-path="1.2" d="M132,11.25C172,11.25,172,-2.5,212,-2.5" stroke-width="1.75" stroke="rgb(255, 127, 14)"/><path class="markmap-link" data-depth="2" data-path="1.10" d="M132,11.25C172,11.25,172,24.25,212,24.25" stroke-width="1.75" stroke="rgb(23, 190, 207)"/><g class="markmap-highlight"/><g data-depth="2" data-path="1.2" class="markmap-node markmap-fold" transform="translate(212, -23.375)"><line stroke="#ff7f0e" stroke-width="1.75" x1="-1" x2="238" y1="20.875" y2="20.875"/><circle stroke-width="1.5" r="6" stroke="#ff7f0e" fill="#ff7f0e" cx="236" cy="20.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="220" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Central Nervous System (CNS)</div></div></foreignObject></g><g data-depth="2" data-path="1.10" class="markmap-node markmap-fold" transform="translate(212, 3.375)"><line stroke="#17becf" stroke-width="1.75" x1="-1" x2="258" y1="20.875" y2="20.875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="#17becf" cx="256" cy="20.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="240" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Peripheral Nervous System (PNS)</div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="134" y1="21.25" y2="21.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="132" cy="21.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="116" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Nervous System</div></div></foreignObject></g></g></svg>