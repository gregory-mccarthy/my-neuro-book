<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 820" style="background-color: #ffffff; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <defs>
    <!-- Arrowheads for Path Routing -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#0284c7" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#ea580c" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#9333ea" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#64748b" />
    </marker>

    <!-- Subtle Drop Shadow for elegant depth -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>

  <style>
    /* CSS trick: Paint-order creates a perfect, tight white halo around text so background lines never obscure it */
    .text-halo {
      paint-order: stroke fill;
      stroke: #ffffff;
      stroke-width: 4px;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .blue-text { fill: #0284c7; }
    .orange-text { fill: #ea580c; }
    .purple-text { fill: #9333ea; }
  </style>

  <!-- ========================================== -->
  <!-- TITLES                                     -->
  <!-- ========================================== -->
  <text x="520" y="45" font-size="28" font-weight="800" fill="#0f172a" text-anchor="middle" letter-spacing="1">THE EMBODIED BRAIN</text>
  <text x="520" y="70" font-size="16" font-weight="500" fill="#475569" text-anchor="middle">Bidirectional pathways of interoception, autonomic regulation, and endocrine signaling</text>

  <!-- ========================================== -->
  <!-- REGIONAL BACKGROUND BOXES                  -->
  <!-- ========================================== -->
  <rect x="30" y="90" width="980" height="170" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="520" y="115" font-size="14" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="1.5">CENTRAL NERVOUS SYSTEM</text>

  <rect x="30" y="550" width="980" height="160" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="520" y="575" font-size="14" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="1.5">PERIPHERAL BODY SYSTEMS</text>

  <!-- ========================================== -->
  <!-- CONNECTION PATHWAYS (Rendered in background) -->
  <!-- ========================================== -->

  <!-- INTERNAL CNS PATHWAYS -->
  <path d="M 345 170 L 375 170" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow-gray)" />
  <path d="M 375 190 L 345 190" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow-gray)" />
  <path d="M 695 180 L 665 180" fill="none" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow-gray)" />

  <!-- AFFERENT (SENSORY) PATHWAYS - BLUE -->
  <path d="M 170 600 L 170 250" fill="none" stroke="#0284c7" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="160" y="420" class="text-halo blue-text" font-size="12" font-weight="600" text-anchor="end">Vagal Afferents (Gut State &amp; Nutrients)</text>

  <path d="M 410 600 C 410 460 290 460 290 250" fill="none" stroke="#0284c7" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="340" y="370" class="text-halo blue-text" font-size="12" font-weight="600" text-anchor="end">CN IX &amp; X Afferents (Baroreceptors)</text>

  <path d="M 590 600 C 590 480 330 480 330 250" fill="none" stroke="#0284c7" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="440" y="500" class="text-halo blue-text" font-size="12" font-weight="600" text-anchor="middle">Vagal Inflammatory Reflex</text>


  <!-- EFFERENT (AUTONOMIC) PATHWAYS - ORANGE -->
  <path d="M 220 250 L 220 600" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="230" y="470" class="text-halo orange-text" font-size="12" font-weight="600" text-anchor="start">Vagal Efferents (Motility &amp; Secretion)</text>

  <path d="M 310 250 C 310 380 385 380 385 600" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="345" y="440" class="text-halo orange-text" font-size="12" font-weight="600" text-anchor="start">Vagal Efferents (Parasympathetic)</text>

  <path d="M 450 250 C 450 420 360 420 360 600" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="400" y="480" class="text-halo orange-text" font-size="12" font-weight="600" text-anchor="start">Sympathetic Efferents (HR &amp; BP)</text>

  <path d="M 520 250 C 520 420 650 420 650 600" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="580" y="340" class="text-halo orange-text" font-size="12" font-weight="600" text-anchor="start">Sympathetic Fibers (Splenic Nerve)</text>

  <path d="M 590 250 C 590 340 890 340 890 600" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="740" y="310" class="text-halo orange-text" font-size="12" font-weight="600" text-anchor="middle">Sympathetic Innervation (Stem Cell Niche)</text>


  <!-- HUMORAL / BLOOD PATHWAYS - PURPLE DASHED -->
  <path d="M 640 250 C 640 300 750 300 750 410" fill="none" stroke="#9333ea" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-purple)" />
  <text x="690" y="380" class="text-halo purple-text" font-size="12" font-weight="600" text-anchor="start">Neuroendocrine Secretion</text>

  <path d="M 835 410 L 835 250" fill="none" stroke="#9333ea" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-purple)" />
  <text x="845" y="330" class="text-halo purple-text" font-size="12" font-weight="600" text-anchor="start">Osmolality, Toxins, Cytokines</text>

  <path d="M 710 600 C 710 520 820 520 820 450" fill="none" stroke="#9333ea" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-purple)" />
  <text x="770" y="540" class="text-halo purple-text" font-size="12" font-weight="600" text-anchor="start">Systemic Cytokines (IL-1β, TNF-α)</text>

  <path d="M 270 600 C 270 540 550 540 550 430" fill="none" stroke="#9333ea" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-purple)" />
  <text x="410" y="530" class="text-halo purple-text" font-size="12" font-weight="600" text-anchor="middle">Microbial Metabolites</text>


  <!-- ========================================== -->
  <!-- STRUCTURAL NODES (Rendered in foreground)  -->
  <!-- ========================================== -->

  <!-- CNS Nodes -->
  <rect x="70" y="130" width="270" height="110" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205" y="165" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Nucleus of the Solitary Tract</text>
  <text x="205" y="185" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">(NTS) &amp; Vagal Complex</text>
  <text x="205" y="205" font-size="12" font-style="italic" fill="#64748b" text-anchor="middle">Visceral Sensory &amp; Motor Hub</text>

  <rect x="385" y="130" width="270" height="110" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="520" y="165" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Hypothalamus &amp; Brainstem</text>
  <text x="520" y="185" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">Autonomic &amp; Endocrine Centers</text>
  <text x="520" y="205" font-size="12" font-style="italic" fill="#64748b" text-anchor="middle">Integration &amp; Efferent Drive</text>

  <rect x="700" y="130" width="270" height="110" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="835" y="165" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Circumventricular Organs</text>
  <text x="835" y="185" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">(Area Postrema, OVLT, SFO)</text>
  <text x="835" y="205" font-size="12" font-style="italic" fill="#64748b" text-anchor="middle">Blood Sensors (Lack BBB)</text>


  <!-- Periphery Nodes -->
  <rect x="70" y="600" width="200" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="635" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Enteric Nervous System</text>
  <text x="170" y="655" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">Gut Wall &amp; Microbiome</text>
  <text x="170" y="675" font-size="12" font-style="italic" fill="#64748b" text-anchor="middle">Visceral State</text>

  <rect x="310" y="600" width="200" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="635" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Cardiovascular System</text>
  <text x="410" y="655" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">Baroreceptors (CN IX &amp; X)</text>
  <text x="410" y="675" font-size="12" font-style="italic" fill="#64748b" text-anchor="middle">Blood Pressure Sensing</text>

  <rect x="550" y="600" width="200" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="635" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Immune System</text>
  <text x="650" y="655" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">Spleen &amp; Lymphatics</text>
  <text x="650" y="675" font-size="12" font-style="italic" fill="#64748b" text-anchor="middle">Cytokines &amp; Macrophages</text>

  <rect x="790" y="600" width="200" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="890" y="635" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Bone Marrow</text>
  <text x="890" y="655" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">Hematopoietic Stem Cells</text>
  <text x="890" y="675" font-size="12" font-style="italic" fill="#64748b" text-anchor="middle">Leukocyte Production</text>

  <!-- Central Bloodstream Node -->
  <rect x="550" y="410" width="440" height="40" rx="20" fill="#fff1f2" stroke="#fda4af" stroke-width="2" filter="url(#shadow)"/>
  <text x="770" y="435" font-size="14" font-weight="700" fill="#be123c" text-anchor="middle">Systemic Circulation (Bloodstream)</text>


  <!-- ========================================== -->
  <!-- LEGEND                                     -->
  <!-- ========================================== -->
  <rect x="70" y="740" width="900" height="50" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="180" y="770" font-size="13" font-weight="700" fill="#475569" text-anchor="end">PATHWAY KEY:</text>

  <path d="M 220 765 L 260 765" fill="none" stroke="#0284c7" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="270" y="769" font-size="12" font-weight="500" fill="#334155" text-anchor="start">Sensory / Afferent Neural</text>

  <path d="M 450 765 L 490 765" fill="none" stroke="#ea580c" stroke-width="3" marker-end="url(#arrow-orange)" />
  <text x="500" y="769" font-size="12" font-weight="500" fill="#334155" text-anchor="start">Autonomic / Efferent Neural</text>

  <path d="M 700 765 L 740 765" fill="none" stroke="#9333ea" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#arrow-purple)" />
  <text x="750" y="769" font-size="12" font-weight="500" fill="#334155" text-anchor="start">Humoral / Endocrine &amp; Blood</text>

</svg>
