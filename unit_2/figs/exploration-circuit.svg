<title id="title">Exploration as a hypothalamic control loop</title>
<desc id="desc">A flow diagram linking body-state and novelty inputs to hypothalamic and adjacent gates, exploratory outputs, upward behavioral projections, and an updated affordance map.</desc>
<rect width="1400" height="900" fill="#ffffff"/>
<text x="700" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif">Exploration as predictive affordance discovery</text>
<text x="700" y="64" text-anchor="middle" font-size="15" fill="#475569" font-family="Arial, Helvetica, sans-serif">The regulated body samples the world so future hunger, thirst, defense, thermoregulation, and social behavior can use a better map.</text>
<g filter="url(#shadow)">
<rect x="40" y="105" width="290" height="265" rx="18" fill="#fff1dc" stroke="#d97706" stroke-width="2"/>
<text x="60" y="140" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="60" dy="0">Body-state inputs</tspan></text>
<circle cx="62" cy="171" r="3" fill="#374151" opacity="0.75"/><text x="75" y="176" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">energy reserve</tspan></text><circle cx="62" cy="196" r="3" fill="#374151" opacity="0.75"/><text x="75" y="201" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">hydration and salt balance</tspan></text><circle cx="62" cy="221" r="3" fill="#374151" opacity="0.75"/><text x="75" y="226" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">thermal comfort</tspan></text><circle cx="62" cy="246" r="3" fill="#374151" opacity="0.75"/><text x="75" y="251" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">sleep-wake state</tspan></text><circle cx="62" cy="271" r="3" fill="#374151" opacity="0.75"/><text x="75" y="276" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">pain, illness, and stress</tspan></text>
<rect x="40" y="410" width="290" height="255" rx="18" fill="#eee7ff" stroke="#7c3aed" stroke-width="2"/>
<text x="60" y="445" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="60" dy="0">Environmental predictive</tspan><tspan x="60" dy="21">cues</tspan></text>
<circle cx="62" cy="497" r="3" fill="#374151" opacity="0.75"/><text x="75" y="502" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">novel objects</tspan></text><circle cx="62" cy="522" r="3" fill="#374151" opacity="0.75"/><text x="75" y="527" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">unfamiliar routes</tspan></text><circle cx="62" cy="547" r="3" fill="#374151" opacity="0.75"/><text x="75" y="552" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">social novelty</tspan></text><circle cx="62" cy="572" r="3" fill="#374151" opacity="0.75"/><text x="75" y="577" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">uncertainty and mismatch</tspan></text><circle cx="62" cy="597" r="3" fill="#374151" opacity="0.75"/><text x="75" y="602" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">learned safety or danger</tspan><tspan x="75" dy="17">cues</tspan></text>
<rect x="395" y="180" width="280" height="360" rx="18" fill="#e7f0ff" stroke="#2563eb" stroke-width="2"/>
<text x="415" y="215" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">Routes and relays</tspan></text>
<circle cx="417" cy="246" r="3" fill="#374151" opacity="0.75"/><text x="430" y="251" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="430" dy="0">blood/endocrine access: ARC,</tspan><tspan x="430" dy="17">median eminence, CVO-related</tspan><tspan x="430" dy="17">pathways</tspan></text><circle cx="417" cy="305" r="3" fill="#374151" opacity="0.75"/><text x="430" y="310" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="430" dy="0">vagus to NTS, area postrema,</tspan><tspan x="430" dy="17">parabrachial</tspan></text><circle cx="417" cy="347" r="3" fill="#374151" opacity="0.75"/><text x="430" y="352" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="430" dy="0">amygdala, BNST, PAG</tspan><tspan x="430" dy="17">threat/safety loops</tspan></text><circle cx="417" cy="389" r="3" fill="#374151" opacity="0.75"/><text x="430" y="394" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="430" dy="0">hippocampus and entorhinal</tspan><tspan x="430" dy="17">context systems</tspan></text><circle cx="417" cy="431" r="3" fill="#374151" opacity="0.75"/><text x="430" y="436" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="430" dy="0">sensory cortex and superior</tspan><tspan x="430" dy="17">colliculus</tspan></text>
<rect x="735" y="180" width="280" height="360" rx="18" fill="#e8f7e8" stroke="#16a34a" stroke-width="2"/>
<text x="755" y="215" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="755" dy="0">Hypothalamic and adjacent</tspan><tspan x="755" dy="21">gates</tspan></text>
<circle cx="757" cy="267" r="3" fill="#374151" opacity="0.75"/><text x="770" y="272" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="770" dy="0">LH / orexin: wakeful</tspan><tspan x="770" dy="17">appetitive arousal</tspan></text><circle cx="757" cy="309" r="3" fill="#374151" opacity="0.75"/><text x="770" y="314" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="770" dy="0">SuM: novelty and hippocampal</tspan><tspan x="770" dy="17">updating</tspan></text><circle cx="757" cy="351" r="3" fill="#374151" opacity="0.75"/><text x="770" y="356" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="770" dy="0">VMH / SF1: mode competition</tspan></text><circle cx="757" cy="376" r="3" fill="#374151" opacity="0.75"/><text x="770" y="381" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="770" dy="0">ARC, PVN, POA: body-state</tspan><tspan x="770" dy="17">gates</tspan></text><circle cx="757" cy="418" r="3" fill="#374151" opacity="0.75"/><text x="770" y="423" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="770" dy="0">ZI: novelty to</tspan><tspan x="770" dy="17">orienting/action</tspan></text>
<rect x="1075" y="180" width="285" height="360" rx="18" fill="#fff5cf" stroke="#ca8a04" stroke-width="2"/>
<text x="1095" y="215" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="1095" dy="0">Outputs to body and behavior</tspan></text>
<circle cx="1097" cy="246" r="3" fill="#374151" opacity="0.75"/><text x="1110" y="251" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1110" dy="0">autonomic support for</tspan><tspan x="1110" dy="17">movement</tspan></text><circle cx="1097" cy="288" r="3" fill="#374151" opacity="0.75"/><text x="1110" y="293" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1110" dy="0">locomotion, orienting,</tspan><tspan x="1110" dy="17">sniffing, gaze</tspan></text><circle cx="1097" cy="330" r="3" fill="#374151" opacity="0.75"/><text x="1110" y="335" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1110" dy="0">approach, pause, retreat,</tspan><tspan x="1110" dy="17">route sampling</tspan></text><circle cx="1097" cy="372" r="3" fill="#374151" opacity="0.75"/><text x="1110" y="377" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1110" dy="0">analgesia/anxiolysis within</tspan><tspan x="1110" dy="17">limits</tspan></text><circle cx="1097" cy="414" r="3" fill="#374151" opacity="0.75"/><text x="1110" y="419" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1110" dy="0">hippocampal map and value</tspan><tspan x="1110" dy="17">updating</tspan></text>
<rect x="1015" y="610" width="335" height="155" rx="18" fill="#f7eafa" stroke="#9333ea" stroke-width="2"/>
<text x="1035" y="645" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="1035" dy="0">Upward projections bias</tspan><tspan x="1035" dy="21">behavior</tspan></text>
<circle cx="1037" cy="697" r="3" fill="#374151" opacity="0.75"/><text x="1050" y="702" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1050" dy="0">VTA / nucleus accumbens</tspan></text><circle cx="1037" cy="722" r="3" fill="#374151" opacity="0.75"/><text x="1050" y="727" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1050" dy="0">hippocampus, cortex, thalamus</tspan></text><circle cx="1037" cy="747" r="3" fill="#374151" opacity="0.75"/><text x="1050" y="752" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1050" dy="0">amygdala, BNST, PAG</tspan></text>
<rect x="445" y="725" width="500" height="105" rx="18" fill="#e6f7f5" stroke="#0f766e" stroke-width="2"/>
<text x="465" y="760" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="465" dy="0">Updated affordance map</tspan></text>
<circle cx="467" cy="791" r="3" fill="#374151" opacity="0.75"/><text x="480" y="796" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="480" dy="0">food, water, shelter, escape routes, mates, allies,</tspan><tspan x="480" dy="17">thermal refuges, danger zones</tspan></text>
