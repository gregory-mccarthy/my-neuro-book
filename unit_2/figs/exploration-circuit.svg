<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
