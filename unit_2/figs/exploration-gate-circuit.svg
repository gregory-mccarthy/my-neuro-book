<text x="970" y="790" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#475569" text-anchor="middle">
<tspan x="970" dy="0">state and map loops</tspan>
</text>
<text x="900" y="1235" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#475569" text-anchor="middle">
<tspan x="900" dy="0">This is a working synthesis: ZI supplies the clearest directed novelty-investigation evidence; hypothalamic nodes supply</tspan>
<tspan x="900" dy="18">arousal, body-state permission, and novelty-memory routing.</tspan>
</text>
</svg>