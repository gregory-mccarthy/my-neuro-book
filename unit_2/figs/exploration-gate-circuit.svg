<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1300" viewBox="0 0 1800 1300" role="img" aria-labelledby="title desc">
<title id="title">Working model of the exploration gate</title>
<desc id="desc">Medial zona incerta is emphasized as the strongest causal novelty-investigation node; SuM, LH/orexin, VMH, ARC, PVN, POA, and SCN provide hypothalamic support and gating.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker></defs>
<rect width="1800" height="1300" fill="#fbfbf7"/>
<text x="900.0" y="48" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="900.0" dy="0">Working model: directed exploration gate</tspan>
</text>
<text x="900.0" y="82" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="17" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="900.0" dy="0">Novelty can pull behavior, but body state and threat decide whether exploration is broad, need-directed, or suppressed.</tspan>
</text>
<rect x="55" y="130" width="365" height="225" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="79" y="164" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="79" dy="0">Permission signals</tspan>
</text>
<text x="83" y="206" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• adequate reserve</tspan>
</text>
<text x="83" y="231" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• fluid balance</tspan>
</text>
<text x="83" y="256" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• thermal neutrality</tspan>
</text>
<text x="83" y="281" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• stable wakefulness</tspan>
</text>
<text x="83" y="306" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• low immediate threat</tspan>
</text>
<rect x="55" y="400" width="365" height="225" rx="24" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="79" y="434" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="79" dy="0">Active novelty drivers</tspan>
</text>
<text x="83" y="476" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• novelty and uncertainty</tspan>
</text>
<text x="83" y="501" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• prediction error</tspan>
</text>
<text x="83" y="526" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• new object / route / conspecific</tspan>
</text>
<text x="83" y="551" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• cortical novelty signals</tspan>
</text>
<rect x="55" y="670" width="365" height="225" rx="24" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="79" y="704" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="79" dy="0">Brakes</tspan>
</text>
<text x="83" y="746" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• hunger / thirst urgency</tspan>
</text>
<text x="83" y="771" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• pain, illness, sleep pressure</tspan>
</text>
<text x="83" y="796" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• thermal stress</tspan>
</text>
<text x="83" y="821" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• predator or social threat</tspan>
</text>
<rect x="55" y="940" width="365" height="160" rx="24" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
<text x="79" y="974" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="19" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="79" dy="0">Need-directed search</tspan>
</text>
<text x="83" y="1016" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• deficits can increase exploration</tspan>
<tspan x="99" dy="19">but narrow it toward food, water,</tspan>
<tspan x="99" dy="19">warmth, shelter, or escape</tspan>
</text>
<rect x="505" y="125" width="780" height="610" rx="34" fill="#ffffff" stroke="#334155" stroke-width="2.5"/>
<text x="895" y="171" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="25" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="895" dy="0">Best causal evidence: medial zona incerta</tspan>
</text>
<text x="895" y="205" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="16" font-weight="650" fill="#475569" text-anchor="middle">
<tspan x="895" dy="0">a diencephalic action gate, not a classical hypothalamic</tspan>
<tspan x="895" dy="20">nucleus</tspan>
</text>
<rect x="550" y="270" width="245" height="115" rx="18" fill="#e8f0ff" stroke="#2563eb" stroke-width="2"/>
<text x="672.5" y="302" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="672.5" dy="0">Prelimbic cortex</tspan>
</text>
<text x="672.5" y="334" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="672.5" dy="0">novelty / arousal input</tspan>
</text>
<text x="672.5" y="354" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="672.5" dy="0">(mouse)</tspan>
</text>
<rect x="850" y="260" width="350" height="135" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="1025.0" y="292" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="1025.0" dy="0">mZI GAD2/TAC1</tspan>
</text>
<text x="1025.0" y="324" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1025.0" dy="0">deep object and social</tspan>
</text>
<text x="1025.0" y="344" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1025.0" dy="0">investigation; not just movement</tspan>
</text>
<rect x="550" y="465" width="245" height="115" rx="18" fill="#e8f0ff" stroke="#2563eb" stroke-width="2"/>
<text x="672.5" y="497" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="672.5" dy="0">AVMTC</tspan>
</text>
<text x="672.5" y="529" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="672.5" dy="0">novel object signal</tspan>
</text>
<text x="672.5" y="549" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="672.5" dy="0">primate</tspan>
</text>
<rect x="850" y="455" width="350" height="135" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="1025.0" y="487" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="1025.0" dy="0">ZI novelty cells</tspan>
</text>
<text x="1025.0" y="519" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1025.0" dy="0">gaze to novel objects</tspan>
</text>
<text x="1025.0" y="539" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1025.0" dy="0">reward-pathway dissociation</tspan>
</text>
<rect x="635" y="630" width="245" height="90" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
<text x="757.5" y="662" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="757.5" dy="0">PAG</tspan>
</text>
<text x="757.5" y="694" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="757.5" dy="0">defense / pursuit</tspan>
</text>
<text x="757.5" y="714" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="757.5" dy="0">action states</tspan>
</text>
<rect x="1005" y="630" width="245" height="90" rx="18" fill="#fff4cc" stroke="#d97706" stroke-width="2"/>
<text x="1127.5" y="662" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="1127.5" dy="0">Cuneiform nucleus</tspan>
</text>
<text x="1127.5" y="694" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1127.5" dy="0">focused exploration</tspan>
</text>
<text x="1127.5" y="714" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1127.5" dy="0">not speed alone</tspan>
</text>
<line x1="795" y1="327" x2="850" y2="327" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="795" y1="522" x2="850" y2="522" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1025" y1="395" x2="760" y2="630" stroke="#b91c1c" stroke-width="4" stroke-linecap="round"/>
<line x1="750.0" y1="618.8" x2="770.0" y2="641.2" stroke="#b91c1c" stroke-width="4" stroke-linecap="round"/>
<line x1="1025" y1="590" x2="1127" y2="630" stroke="#b91c1c" stroke-width="4" stroke-linecap="round"/>
<line x1="1121.5" y1="644.0" x2="1132.5" y2="616.0" stroke="#b91c1c" stroke-width="4" stroke-linecap="round"/>
<text x="850" y="612" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="14" font-weight="800" fill="#b91c1c" text-anchor="middle">
<tspan x="850" dy="0">inhibitory action gating</tspan>
</text>
<rect x="505" y="830" width="780" height="310" rx="34" fill="#ffffff" stroke="#334155" stroke-width="2.5"/>
<text x="895" y="876" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="25" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="895" dy="0">Hypothalamic support and gating</tspan>
</text>
<text x="895" y="910" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="16" font-weight="650" fill="#475569" text-anchor="middle">
<tspan x="895" dy="0">body-state permission; arousal; novelty-to-memory routing</tspan>
</text>
<rect x="545" y="955" width="210" height="95" rx="18" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
<text x="650.0" y="987" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="650.0" dy="0">SuM</tspan>
</text>
<text x="650.0" y="1019" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="650.0" dy="0">DG / CA2 novelty</tspan>
</text>
<text x="650.0" y="1039" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="650.0" dy="0">map updating</tspan>
</text>
<rect x="785" y="955" width="210" height="95" rx="18" fill="#eaf7ec" stroke="#16a34a" stroke-width="2"/>
<text x="890.0" y="987" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="890.0" dy="0">LH / orexin</tspan>
</text>
<text x="890.0" y="1019" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="890.0" dy="0">wakeful arousal</tspan>
</text>
<text x="890.0" y="1039" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="890.0" dy="0">not curiosity command</tspan>
</text>
<rect x="1025" y="955" width="210" height="95" rx="18" fill="#eaf7ec" stroke="#16a34a" stroke-width="2"/>
<text x="1130.0" y="987" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="1130.0" dy="0">VMH / SF1</tspan>
</text>
<text x="1130.0" y="1019" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1130.0" dy="0">mode competition</tspan>
</text>
<text x="1130.0" y="1039" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1130.0" dy="0">metabolic budget</tspan>
</text>
<rect x="660" y="1070" width="470" height="50" rx="18" fill="#eaf7ec" stroke="#16a34a" stroke-width="2"/>
<text x="895.0" y="1102" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="895.0" dy="0">ARC / PVN / POA / SCN</tspan>
</text>
<text x="895.0" y="1134" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="895.0" dy="0">energy, stress, thermal, circadian gates</tspan>
</text>
<rect x="1390" y="130" width="350" height="245" rx="24" fill="#fff4cc" stroke="#d97706" stroke-width="2"/>
<text x="1414" y="164" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="1414" dy="0">Directed investigation</tspan>
</text>
<text x="1418" y="206" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• deep object investigation</tspan>
</text>
<text x="1418" y="231" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• social investigation</tspan>
</text>
<text x="1418" y="256" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• novelty-seeking gaze shifts</tspan>
</text>
<text x="1418" y="281" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• focused exploration / head dips</tspan>
</text>
<rect x="1390" y="450" width="350" height="245" rx="24" fill="#fff1d6" stroke="#d97706" stroke-width="2"/>
<text x="1414" y="484" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="1414" dy="0">Body and action support</tspan>
</text>
<text x="1418" y="526" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• moderate sympathetic activation</tspan>
</text>
<text x="1418" y="551" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• orienting and sensory gain</tspan>
</text>
<text x="1418" y="576" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• approach / pause / retreat</tspan>
</text>
<text x="1418" y="601" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• analgesia or anxiolysis within</tspan>
<tspan x="1434" dy="19">limits</tspan>
</text>
<rect x="1390" y="800" width="350" height="265" rx="24" fill="#f6e7f8" stroke="#9333ea" stroke-width="2"/>
<text x="1414" y="834" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="1414" dy="0">Map and value updating</tspan>
</text>
<text x="1418" y="876" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• hippocampal context and social</tspan>
<tspan x="1434" dy="19">memory</tspan>
</text>
<text x="1418" y="920" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• VTA / NAc information value</tspan>
</text>
<text x="1418" y="945" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• cortex: plans and object</tspan>
<tspan x="1434" dy="19">meaning</tspan>
</text>
<text x="1418" y="989" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• future affordance predictions</tspan>
</text>
