<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="930" viewBox="0 0 1400 930" role="img" aria-label="Circadian-gated sleep-wake flip-flop circuit">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
  <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#1D4ED8"/></marker>
  <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#047857"/></marker>
  <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#EA580C"/></marker>
</defs>
<rect x="0" y="0" width="1400" height="930" fill="#FFFFFF"/>
<style>text{font-family:Arial, Helvetica, sans-serif;}</style>
<text x="700" y="34" text-anchor="middle" font-size="22" fill="#0F172A" font-weight="700">Circadian-gated sleep–wake switch</text>
<rect x="60" y="70" width="220" height="90" rx="16" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.6"/>
<text x="170.0" y="94" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="170.0" dy="0">Light</tspan>
</text>
<text x="170.0" y="117" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="170.0" dy="0">ipRGC melanopsin signal</tspan>
</text>
<rect x="350" y="70" width="230" height="90" rx="16" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
<text x="465.0" y="94" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="465.0" dy="0">Retinohypothalamic</tspan>
<tspan x="465.0" dy="19">tract</tspan>
</text>
<text x="465.0" y="136" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="465.0" dy="0">direct retinal input to</tspan>
<tspan x="465.0" dy="15">SCN</tspan>
</text>
<rect x="650" y="70" width="230" height="98" rx="16" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
<text x="765.0" y="94" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="765.0" dy="0">SCN</tspan>
</text>
<text x="765.0" y="117" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="765.0" dy="0">endogenous master clock</tspan>
<tspan x="765.0" dy="15">reset by light</tspan>
</text>
<rect x="960" y="70" width="285" height="98" rx="16" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
<text x="1102.5" y="94" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="1102.5" dy="0">SPZ / DMH / PVN</tspan>
</text>
<text x="1102.5" y="117" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="1102.5" dy="0">circadian output to sleep,</tspan>
<tspan x="1102.5" dy="15">temperature, endocrine,</tspan>
<tspan x="1102.5" dy="15">autonomic rhythms</tspan>
</text>
<rect x="1010" y="205" width="225" height="82" rx="16" fill="#FCE7F3" stroke="#BE185D" stroke-width="1.6"/>
<text x="1122.5" y="229" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A">
<tspan x="1122.5" dy="0">Pineal gland</tspan>
</text>
<text x="1122.5" y="251" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="1122.5" dy="0">melatonin: biological</tspan>
<tspan x="1122.5" dy="15">night</tspan>
</text>
<rect x="70" y="320" width="240" height="96" rx="16" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.6"/>
<text x="190.0" y="344" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="190.0" dy="0">Process S</tspan>
</text>
<text x="190.0" y="367" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="190.0" dy="0">wake duration, adenosine,</tspan>
<tspan x="190.0" dy="15">local sleep pressure</tspan>
</text>
<rect x="430" y="300" width="260" height="120" rx="16" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.6"/>
<text x="560.0" y="324" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="560.0" dy="0">VLPO / MnPO</tspan>
</text>
<text x="560.0" y="347" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="560.0" dy="0">sleep-active GABA / galanin</tspan>
<tspan x="560.0" dy="15">neurons</tspan>
</text>
<rect x="825" y="300" width="330" height="120" rx="16" fill="#FFEDD5" stroke="#EA580C" stroke-width="1.6"/>
<text x="990.0" y="324" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="990.0" dy="0">Wake-promoting systems</tspan>
</text>
<text x="990.0" y="347" text-anchor="middle" font-size="11.5" fill="#334155">
<tspan x="990.0" dy="0">LC norepinephrine • raphe</tspan>
<tspan x="990.0" dy="14.5">serotonin • TMN histamine • VTA</tspan>
<tspan x="990.0" dy="14.5">dopamine • basal forebrain /</tspan>
<tspan x="990.0" dy="14.5">brainstem ACh and glutamate</tspan>
</text>
<rect x="590" y="535" width="290" height="112" rx="16" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
<text x="735.0" y="559" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="735.0" dy="0">Lateral hypothalamus</tspan>
<tspan x="735.0" dy="19">orexin</tspan>
</text>
<text x="735.0" y="601" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="735.0" dy="0">stabilizes wakefulness and</tspan>
<tspan x="735.0" dy="15">links arousal to hunger,</tspan>
<tspan x="735.0" dy="15">threat, and reward</tspan>
</text>
<rect x="105" y="535" width="260" height="100" rx="16" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
<text x="235.0" y="559" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A">
<tspan x="235.0" dy="0">Energy / limbic inputs</tspan>
</text>
<text x="235.0" y="581" text-anchor="middle" font-size="11.5" fill="#334155">
<tspan x="235.0" dy="0">ghrelin and amygdala</tspan>
<tspan x="235.0" dy="14.5">activate; leptin and</tspan>
<tspan x="235.0" dy="14.5">glucose restrain</tspan>
</text>
<rect x="980" y="535" width="260" height="100" rx="16" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.6"/>
<text x="1110.0" y="559" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="1110.0" dy="0">Cortex and behavior</tspan>
</text>
<text x="1110.0" y="582" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="1110.0" dy="0">alertness, movement,</tspan>
<tspan x="1110.0" dy="15">vigilance, foraging</tspan>
</text>
<rect x="360" y="730" width="260" height="90" rx="16" fill="#F1F5F9" stroke="#475569" stroke-width="1.6"/>
<text x="490.0" y="754" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="490.0" dy="0">NREM state</tspan>
</text>
<text x="490.0" y="777" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="490.0" dy="0">slow waves, spindles,</tspan>
<tspan x="490.0" dy="15">sensory gating</tspan>
</text>
<rect x="720" y="730" width="280" height="90" rx="16" fill="#F1F5F9" stroke="#475569" stroke-width="1.6"/>
<text x="860.0" y="754" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">
<tspan x="860.0" dy="0">REM state</tspan>
</text>
<text x="860.0" y="777" text-anchor="middle" font-size="12" fill="#334155">
<tspan x="860.0" dy="0">pontine activation, vivid</tspan>
<tspan x="860.0" dy="15">imagery, motor atonia</tspan>
</text>
<rect x="1060" y="730" width="235" height="90" rx="16" fill="#F1F5F9" stroke="#475569" stroke-width="1.6"/>
<text x="1177.5" y="754" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A">
<tspan x="1177.5" dy="0">REM atonia pathway</tspan>
</text>
<text x="1177.5" y="776" text-anchor="middle" font-size="11.5" fill="#334155">
<tspan x="1177.5" dy="0">pontine–medullary</tspan>
<tspan x="1177.5" dy="14.5">inhibition of spinal</tspan>
<tspan x="1177.5" dy="14.5">motor neurons</tspan>
</text>
<line x1="280" y1="115" x2="350" y2="115" stroke="#1D4ED8" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
<line x1="580" y1="115" x2="650" y2="115" stroke="#1D4ED8" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
<line x1="880" y1="119" x2="960" y2="119" stroke="#1D4ED8" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
<path d="M 1110 168 C 1135 180, 1130 190, 1122 205" fill="none" stroke="#BE185D" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 720 168 C 680 220, 600 250, 560 300" fill="none" stroke="#1D4ED8" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
<path d="M 800 168 C 850 230, 940 250, 970 300" fill="none" stroke="#1D4ED8" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
<path d="M 770 168 C 815 300, 770 455, 735 535" fill="none" stroke="#1D4ED8" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
<text x="565" y="260" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="700">circadian sleep gate</text>
<text x="940" y="260" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="700">circadian wake drive</text>
<line x1="310" y1="368" x2="430" y2="360" stroke="#1D4ED8" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
<text x="365" y="345" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="700">sleep pressure</text>
<line x1="365" y1="585" x2="590" y2="590" stroke="#047857" stroke-width="2.4" marker-end="url(#arrowGreen)"/>
<text x="475" y="572" text-anchor="middle" font-size="12" fill="#047857" font-weight="700">state context</text>
<line x1="690" y1="340" x2="825" y2="340" stroke="#B91C1C" stroke-width="2.8"/>
<line x1="825.0" y1="331.0" x2="825.0" y2="349.0" stroke="#B91C1C" stroke-width="3.5999999999999996"/>
<line x1="825" y1="385" x2="690" y2="385" stroke="#B91C1C" stroke-width="2.8"/>
<line x1="690.0" y1="394.0" x2="690.0" y2="376.0" stroke="#B91C1C" stroke-width="3.5999999999999996"/>
<text x="758" y="322" text-anchor="middle" font-size="13" fill="#B91C1C" font-weight="700">mutual inhibition</text>
<line x1="555" y1="420" x2="620" y2="535" stroke="#B91C1C" stroke-width="2.8"/>
<line x1="627.8350655484812" y1="530.5714846899889" x2="612.1649344515188" y2="539.4285153100111" stroke="#B91C1C" stroke-width="3.5999999999999996"/>
<line x1="880" y1="575" x2="920" y2="420" stroke="#EA580C" stroke-width="2.4" marker-end="url(#arrowOrange)"/>
<text x="915" y="510" text-anchor="middle" font-size="12" fill="#EA580C" font-weight="700">orexin stabilizes arousal</text>
<line x1="1085" y1="420" x2="1110" y2="535" stroke="#EA580C" stroke-width="2.4" marker-end="url(#arrowOrange)"/>
<line x1="880" y1="590" x2="980" y2="590" stroke="#EA580C" stroke-width="2.4" marker-end="url(#arrowOrange)"/>
<line x1="535" y1="420" x2="500" y2="730" stroke="#1D4ED8" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
<path d="M 990 420 C 980 555, 890 650, 860 730" fill="none" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)" stroke-dasharray="6 5"/>
<text x="900" y="675" text-anchor="middle" font-size="12" fill="#475569" font-weight="700">REM gating</text>
<line x1="1000" y1="775" x2="1060" y2="775" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="60" y="840" width="300" height="60" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
<line x1="85" y1="862" x2="135" y2="862" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
<text x="145" y="866" font-size="13" fill="#334155">excitation / drive</text>
<line x1="85" y1="884" x2="135" y2="884" stroke="#B91C1C" stroke-width="2.8"/>
<line x1="135" y1="876" x2="135" y2="892" stroke="#B91C1C" stroke-width="3.4"/>
<text x="145" y="888" font-size="13" fill="#334155">inhibition</text>
<rect x="420" y="850" width="890" height="44" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
<text x="865" y="878" text-anchor="middle" font-size="14" fill="#334155">Orexin does not simply “turn wake on”; it stabilizes wakefulness when body state and circadian phase favor action.</text>
</svg>