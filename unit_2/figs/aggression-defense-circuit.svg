<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Hypothalamic aggression and defense control loop</title>
  <desc id="desc">A flow diagram showing inputs from the body and world, routes and relays to the hypothalamus, hypothalamic integration nodes, outputs back to the body, and upward projections that bias motivated behavior.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .smalltitle { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .label { font: 500 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .tiny { font: 500 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .box { stroke: #334155; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .subbox { stroke: #64748b; stroke-width: 1.2; rx: 14; }
      .arrow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrowblue { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrowBlue); }
      .dash { stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="44" text-anchor="middle" class="title">Aggression and defense as a hypothalamic control loop</text>

  <rect x="50" y="95" width="245" height="650" class="box" fill="#e0f2fe"/>
  <text x="172" y="128" text-anchor="middle" class="smalltitle">Body and world inputs</text>
  <rect x="75" y="160" width="195" height="66" class="subbox" fill="#f0f9ff"/>
  <text x="172" y="187" text-anchor="middle" class="label">Predator cues</text>
  <text x="172" y="209" text-anchor="middle" class="tiny">odor • looming • sound</text>
  <rect x="75" y="245" width="195" height="66" class="subbox" fill="#f0f9ff"/>
  <text x="172" y="272" text-anchor="middle" class="label">Conspecific cues</text>
  <text x="172" y="294" text-anchor="middle" class="tiny">sex • rival • dominance</text>
  <rect x="75" y="330" width="195" height="66" class="subbox" fill="#f0f9ff"/>
  <text x="172" y="357" text-anchor="middle" class="label">Pain and injury</text>
  <text x="172" y="379" text-anchor="middle" class="tiny">nociception • contact</text>
  <rect x="75" y="415" width="195" height="66" class="subbox" fill="#f0f9ff"/>
  <text x="172" y="442" text-anchor="middle" class="label">Hormonal state</text>
  <text x="172" y="464" text-anchor="middle" class="tiny">gonadal • stress</text>
  <rect x="75" y="500" width="195" height="66" class="subbox" fill="#f0f9ff"/>
  <text x="172" y="527" text-anchor="middle" class="label">Internal condition</text>
  <text x="172" y="549" text-anchor="middle" class="tiny">energy • illness • fatigue</text>
  <rect x="75" y="585" width="195" height="86" class="subbox" fill="#f0f9ff"/>
  <text x="172" y="613" text-anchor="middle" class="label">Predictive context</text>
  <text x="172" y="637" text-anchor="middle" class="tiny">home territory</text>
  <text x="172" y="659" text-anchor="middle" class="tiny">memory • prior defeat/win</text>

  <rect x="350" y="95" width="255" height="650" class="box" fill="#ede9fe"/>
  <text x="478" y="128" text-anchor="middle" class="smalltitle">Routes and relays</text>
  <rect x="375" y="160" width="205" height="72" class="subbox" fill="#f5f3ff"/>
  <text x="478" y="187" text-anchor="middle" class="label">Sensory systems</text>
  <text x="478" y="210" text-anchor="middle" class="tiny">visual • auditory • somatic</text>
  <rect x="375" y="255" width="205" height="88" class="subbox" fill="#f5f3ff"/>
  <text x="478" y="282" text-anchor="middle" class="label">Olfactory / VNO route</text>
  <text x="478" y="305" text-anchor="middle" class="tiny">AOB → MeA → BNST</text>
  <text x="478" y="327" text-anchor="middle" class="tiny">social and predator odors</text>
  <rect x="375" y="365" width="205" height="88" class="subbox" fill="#f5f3ff"/>
  <text x="478" y="392" text-anchor="middle" class="label">Spinal / vagal afferents</text>
  <text x="478" y="415" text-anchor="middle" class="tiny">pain • visceral state</text>
  <text x="478" y="437" text-anchor="middle" class="tiny">NTS • area postrema</text>
  <rect x="375" y="475" width="205" height="86" class="subbox" fill="#f5f3ff"/>
  <text x="478" y="502" text-anchor="middle" class="label">Parabrachial / PAG</text>
  <text x="478" y="525" text-anchor="middle" class="tiny">nociception</text>
  <text x="478" y="547" text-anchor="middle" class="tiny">defensive patterning</text>
  <rect x="375" y="585" width="205" height="86" class="subbox" fill="#f5f3ff"/>
  <text x="478" y="612" text-anchor="middle" class="label">Memory and appraisal</text>
  <text x="478" y="635" text-anchor="middle" class="tiny">hippocampus • cortex</text>
  <text x="478" y="657" text-anchor="middle" class="tiny">rules • learned safety</text>

  <rect x="660" y="95" width="255" height="650" class="box" fill="#dcfce7"/>
  <text x="788" y="128" text-anchor="middle" class="smalltitle">Hypothalamic targets</text>
  <rect x="685" y="165" width="205" height="78" class="subbox" fill="#f0fdf4"/>
  <text x="788" y="192" text-anchor="middle" class="label">VMHdm/c</text>
  <text x="788" y="215" text-anchor="middle" class="tiny">SF1+ defense state</text>
  <rect x="685" y="265" width="205" height="78" class="subbox" fill="#f0fdf4"/>
  <text x="788" y="292" text-anchor="middle" class="label">PMd / AHN</text>
  <text x="788" y="315" text-anchor="middle" class="tiny">predator defense route</text>
  <rect x="685" y="365" width="205" height="78" class="subbox" fill="#f0fdf4"/>
  <text x="788" y="392" text-anchor="middle" class="label">VMHvl</text>
  <text x="788" y="415" text-anchor="middle" class="tiny">social aggression state</text>
  <rect x="685" y="465" width="205" height="78" class="subbox" fill="#f0fdf4"/>
  <text x="788" y="492" text-anchor="middle" class="label">PVN</text>
  <text x="788" y="515" text-anchor="middle" class="tiny">HPA and autonomic output</text>
  <rect x="685" y="565" width="205" height="78" class="subbox" fill="#f0fdf4"/>
  <text x="788" y="592" text-anchor="middle" class="label">LH / preoptic area</text>
  <text x="788" y="615" text-anchor="middle" class="tiny">arousal • competing modes</text>

  <rect x="970" y="95" width="260" height="420" class="box" fill="#fee2e2"/>
  <text x="1100" y="128" text-anchor="middle" class="smalltitle">Outputs to body</text>
  <rect x="995" y="165" width="210" height="66" class="subbox" fill="#fff1f2"/>
  <text x="1100" y="192" text-anchor="middle" class="label">Autonomic arousal</text>
  <text x="1100" y="214" text-anchor="middle" class="tiny">heart • vessels • respiration</text>
  <rect x="995" y="250" width="210" height="66" class="subbox" fill="#fff1f2"/>
  <text x="1100" y="277" text-anchor="middle" class="label">Endocrine stress</text>
  <text x="1100" y="299" text-anchor="middle" class="tiny">CRH → ACTH → cortisol</text>
  <rect x="995" y="335" width="210" height="66" class="subbox" fill="#fff1f2"/>
  <text x="1100" y="362" text-anchor="middle" class="label">PAG patterning</text>
  <text x="1100" y="384" text-anchor="middle" class="tiny">freeze • flee • threat • attack</text>
  <rect x="995" y="420" width="210" height="66" class="subbox" fill="#fff1f2"/>
  <text x="1100" y="447" text-anchor="middle" class="label">Analgesia and posture</text>
  <text x="1100" y="469" text-anchor="middle" class="tiny">muscle readiness • pain control</text>

  <rect x="970" y="565" width="360" height="180" class="box" fill="#ffedd5"/>
  <text x="1150" y="598" text-anchor="middle" class="smalltitle">Upward projections for behavior</text>
  <rect x="995" y="625" width="310" height="88" class="subbox" fill="#fff7ed"/>
  <text x="1150" y="652" text-anchor="middle" class="label">Motivation, memory, and action bias</text>
  <text x="1150" y="675" text-anchor="middle" class="tiny">amygdala • BNST • hippocampus • thalamus</text>
  <text x="1150" y="697" text-anchor="middle" class="tiny">VTA • nucleus accumbens • prefrontal cortex</text>

  <path class="arrow" d="M 295 195 C 322 195, 325 195, 350 195"/>
  <path class="arrow" d="M 295 280 C 322 280, 325 300, 350 300"/>
  <path class="arrow" d="M 295 365 C 322 365, 325 410, 350 410"/>
  <path class="arrow" d="M 295 448 C 330 448, 330 505, 350 505"/>
  <path class="arrow" d="M 295 628 C 320 628, 330 628, 350 628"/>

  <path class="arrow" d="M 605 195 C 635 195, 635 205, 660 205"/>
  <path class="arrow" d="M 605 300 C 635 300, 635 395, 660 395"/>
  <path class="arrow" d="M 605 410 C 635 410, 635 305, 660 305"/>
  <path class="arrow" d="M 605 518 C 635 518, 635 505, 660 505"/>
  <path class="arrow" d="M 605 628 C 635 628, 635 605, 660 605"/>

  <path class="arrow" d="M 915 205 C 940 205, 948 198, 970 198"/>
  <path class="arrow" d="M 915 405 C 940 405, 948 368, 970 368"/>
  <path class="arrow" d="M 915 505 C 940 505, 948 283, 970 283"/>
  <path class="arrow" d="M 915 605 C 942 605, 948 452, 970 452"/>

  <path class="arrowblue dash" d="M 875 655 C 910 720, 930 735, 970 675"/>
  <path class="arrowblue dash" d="M 1150 565 C 1138 535, 1124 520, 1100 515"/>

  <rect x="500" y="790" width="400" height="62" rx="20" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="700" y="817" text-anchor="middle" class="label">Control logic</text>
  <text x="700" y="840" text-anchor="middle" class="tiny">early cues + internal state + context → predicted danger → prepared body and selected action</text>
</svg>
