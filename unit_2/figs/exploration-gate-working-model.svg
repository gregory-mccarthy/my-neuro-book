<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title2 desc2">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.10"/>
  </filter>
</defs>
<title id="title2">Working model of exploratory gating</title>
<desc id="desc2">A working model showing braking, permission, and novelty-driver inputs converging on LH/orexin, SuM, ZI, VMH, and hypothalamic body-state gates to produce exploratory outputs.</desc>
<rect width="1400" height="900" fill="#ffffff"/>
<text x="700" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif">Exploration gate: a working model</text>
<text x="700" y="66" text-anchor="middle" font-size="15" fill="#475569" font-family="Arial, Helvetica, sans-serif">Exploration appears when brakes are low, permission signals are adequate, and novelty or uncertainty pulls the animal outward.</text>
<g filter="url(#shadow)">
<rect x="40" y="115" width="285" height="365" rx="18" fill="#fde8e8" stroke="#dc2626" stroke-width="2"/>
<text x="60" y="150" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="60" dy="0">Brakes narrow behavior</tspan></text>
<circle cx="62" cy="181" r="3" fill="#374151" opacity="0.75"/><text x="75" y="186" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">acute hunger or thirst</tspan></text><circle cx="62" cy="206" r="3" fill="#374151" opacity="0.75"/><text x="75" y="211" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">predator or social threat</tspan></text><circle cx="62" cy="231" r="3" fill="#374151" opacity="0.75"/><text x="75" y="236" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">pain, sickness, malaise</tspan></text><circle cx="62" cy="256" r="3" fill="#374151" opacity="0.75"/><text x="75" y="261" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">sleep pressure</tspan></text><circle cx="62" cy="281" r="3" fill="#374151" opacity="0.75"/><text x="75" y="286" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">thermal stress</tspan></text><circle cx="62" cy="306" r="3" fill="#374151" opacity="0.75"/><text x="75" y="311" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="75" dy="0">high HPA activation</tspan></text>
<rect x="380" y="115" width="285" height="260" rx="18" fill="#e8f7e8" stroke="#16a34a" stroke-width="2"/>
<text x="400" y="150" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="400" dy="0">Permission lowers threshold</tspan></text>
<circle cx="402" cy="181" r="3" fill="#374151" opacity="0.75"/><text x="415" y="186" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">satiety or adequate reserve</tspan></text><circle cx="402" cy="206" r="3" fill="#374151" opacity="0.75"/><text x="415" y="211" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">hydration</tspan></text><circle cx="402" cy="231" r="3" fill="#374151" opacity="0.75"/><text x="415" y="236" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">thermal neutrality</tspan></text><circle cx="402" cy="256" r="3" fill="#374151" opacity="0.75"/><text x="415" y="261" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">wakefulness</tspan></text><circle cx="402" cy="281" r="3" fill="#374151" opacity="0.75"/><text x="415" y="286" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">learned safety</tspan></text><circle cx="402" cy="306" r="3" fill="#374151" opacity="0.75"/><text x="415" y="311" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">manageable uncertainty</tspan></text>
<rect x="380" y="415" width="285" height="230" rx="18" fill="#e7f0ff" stroke="#2563eb" stroke-width="2"/>
<text x="400" y="450" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="400" dy="0">Active drivers pull approach</tspan></text>
<circle cx="402" cy="481" r="3" fill="#374151" opacity="0.75"/><text x="415" y="486" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">novelty</tspan></text><circle cx="402" cy="506" r="3" fill="#374151" opacity="0.75"/><text x="415" y="511" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">uncertainty</tspan></text><circle cx="402" cy="531" r="3" fill="#374151" opacity="0.75"/><text x="415" y="536" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">prediction error</tspan></text><circle cx="402" cy="556" r="3" fill="#374151" opacity="0.75"/><text x="415" y="561" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">changed landmarks</tspan></text><circle cx="402" cy="581" r="3" fill="#374151" opacity="0.75"/><text x="415" y="586" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="415" dy="0">social novelty</tspan></text>
<rect x="735" y="130" width="310" height="500" rx="20" fill="#fff7d6" stroke="#ca8a04" stroke-width="2"/>
<text x="890" y="163" text-anchor="middle" font-size="19" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif">Hypothalamic + adjacent gate</text>
<rect x="765" y="190" width="250" height="60" rx="13" fill="#ffffff" stroke="#d6a30f" stroke-width="1.5"/>
<text x="779" y="215" font-size="16" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif">LH / orexin</text>
<text x="779" y="236" font-size="13" font-weight="400" fill="#4b5563" font-family="Arial, Helvetica, sans-serif"><tspan x="779" dy="0">wakeful appetitive arousal</tspan></text>
<rect x="765" y="265" width="250" height="60" rx="13" fill="#ffffff" stroke="#d6a30f" stroke-width="1.5"/>
<text x="779" y="290" font-size="16" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif">SuM</text>
<text x="779" y="311" font-size="13" font-weight="400" fill="#4b5563" font-family="Arial, Helvetica, sans-serif"><tspan x="779" dy="0">novelty to hippocampal</tspan><tspan x="779" dy="15">updating</tspan></text>
<rect x="765" y="340" width="250" height="60" rx="13" fill="#ffffff" stroke="#d6a30f" stroke-width="1.5"/>
<text x="779" y="365" font-size="16" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif">ZI</text>
<text x="779" y="386" font-size="13" font-weight="400" fill="#4b5563" font-family="Arial, Helvetica, sans-serif"><tspan x="779" dy="0">novelty to orienting and</tspan><tspan x="779" dy="15">action</tspan></text>
<rect x="765" y="415" width="250" height="60" rx="13" fill="#ffffff" stroke="#d6a30f" stroke-width="1.5"/>
<text x="779" y="440" font-size="16" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif">VMH / SF1</text>
<text x="779" y="461" font-size="13" font-weight="400" fill="#4b5563" font-family="Arial, Helvetica, sans-serif"><tspan x="779" dy="0">competition among modes</tspan></text>
<rect x="765" y="490" width="250" height="92" rx="13" fill="#ffffff" stroke="#d6a30f" stroke-width="1.5"/>
<text x="779" y="515" font-size="16" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif">ARC · PVN · POA</text>
<text x="779" y="536" font-size="13" font-weight="400" fill="#4b5563" font-family="Arial, Helvetica, sans-serif"><tspan x="779" dy="0">metabolic, stress, thermal,</tspan><tspan x="779" dy="15">and sleep gates</tspan></text>
<rect x="1100" y="140" width="260" height="445" rx="18" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
<text x="1120" y="175" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="1120" dy="0">Exploratory outputs</tspan></text>
<circle cx="1122" cy="206" r="3" fill="#374151" opacity="0.75"/><text x="1135" y="211" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1135" dy="0">locomotor sampling</tspan></text><circle cx="1122" cy="231" r="3" fill="#374151" opacity="0.75"/><text x="1135" y="236" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1135" dy="0">orienting, gaze, sniffing,</tspan><tspan x="1135" dy="17">whisking</tspan></text><circle cx="1122" cy="273" r="3" fill="#374151" opacity="0.75"/><text x="1135" y="278" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1135" dy="0">approach, pause, retreat</tspan></text><circle cx="1122" cy="298" r="3" fill="#374151" opacity="0.75"/><text x="1135" y="303" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1135" dy="0">hippocampal theta and</tspan><tspan x="1135" dy="17">place-map updating</tspan></text><circle cx="1122" cy="340" r="3" fill="#374151" opacity="0.75"/><text x="1135" y="345" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1135" dy="0">VTA/NAc value updating</tspan></text><circle cx="1122" cy="365" r="3" fill="#374151" opacity="0.75"/><text x="1135" y="370" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="1135" dy="0">PAG/autonomic modulation</tspan></text>
<rect x="455" y="770" width="610" height="110" rx="18" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
<text x="475" y="805" font-size="18" font-weight="700" fill="#111827" font-family="Arial, Helvetica, sans-serif"><tspan x="475" dy="0">Interpretation</tspan></text>
<circle cx="477" cy="836" r="3" fill="#374151" opacity="0.75"/><text x="490" y="841" font-size="14" fill="#374151" font-family="Arial, Helvetica, sans-serif"><tspan x="490" dy="0">Not a single canonical microcircuit, but a state-gated loop</tspan><tspan x="490" dy="17">linking bodily sufficiency, novelty, arousal, movement, and map</tspan><tspan x="490" dy="17">updating.</tspan></text>
</g>
<polyline points="325,430 350,695 735,695 735,310" fill="none" stroke="#b91c1c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><line x1="735" y1="296" x2="735" y2="324" stroke="#b91c1c" stroke-width="3" stroke-linecap="round"/>
<line x1="665" y1="245" x2="735" y2="255" stroke="#16a34a" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="665" y1="520" x2="735" y2="475" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1045" y1="370" x2="1100" y2="370" stroke="#9333ea" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="890" y1="630" x2="820" y2="770" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="520" y="690" font-size="13" fill="#991b1b" font-family="Arial, Helvetica, sans-serif">brakes inhibit broad exploration</text>
<text x="670" y="232" font-size="13" fill="#166534" font-family="Arial, Helvetica, sans-serif">permission</text>
<text x="670" y="505" font-size="13" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif">drivers</text>
</svg>