<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940" role="img" aria-labelledby="title desc">
  <title id="title">VMH defense and aggression circuit detail</title>
  <desc id="desc">A detailed diagram of predator-defense and conspecific-aggression pathways through medial amygdala, BNST, lateral septum, VMHdm/c, PMd, VMHvl, and PAG, with excitatory arrows, inhibitory brakes, state-setting hormones, context inputs, and action outputs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
    <marker id="inhib" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 10 1 L 10 11" stroke="#b91c1c" stroke-width="2.6"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 24px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 600 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .smalltitle { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .label { font: 600 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .tiny { font: 500 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .box { stroke: #334155; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .subbox { stroke: #64748b; stroke-width: 1.2; rx: 14; }
      .arrow { stroke: #1f2937; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .arrowgreen { stroke: #047857; stroke-width: 2.5; fill: none; marker-end: url(#arrowGreen); }
      .inhib { stroke: #b91c1c; stroke-width: 2.8; fill: none; marker-end: url(#inhib); }
      .dash { stroke-dasharray: 7 7; }
      .fine { stroke-width: 1.8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="940" fill="#f8fafc"/>
  <text x="750" y="44" text-anchor="middle" class="title">Defense and aggression mode selection in medial hypothalamic circuits</text>
  <text x="750" y="72" text-anchor="middle" class="subtitle">Parallel threat streams converge on VMH and PAG, while septal, cortical, contextual, and hormonal signals set thresholds.</text>

  <rect x="55" y="130" width="250" height="220" class="box" fill="#e0f2fe"/>
  <text x="180" y="164" text-anchor="middle" class="smalltitle">Predator / injury cues</text>
  <rect x="80" y="195" width="200" height="50" class="subbox" fill="#f0f9ff"/>
  <text x="180" y="226" text-anchor="middle" class="label">predator odor</text>
  <rect x="80" y="260" width="200" height="50" class="subbox" fill="#f0f9ff"/>
  <text x="180" y="291" text-anchor="middle" class="label">looming / pain</text>

  <rect x="55" y="520" width="250" height="220" class="box" fill="#ede9fe"/>
  <text x="180" y="554" text-anchor="middle" class="smalltitle">Conspecific cues</text>
  <rect x="80" y="585" width="200" height="50" class="subbox" fill="#f5f3ff"/>
  <text x="180" y="616" text-anchor="middle" class="label">VNO / olfaction</text>
  <rect x="80" y="650" width="200" height="50" class="subbox" fill="#f5f3ff"/>
  <text x="180" y="681" text-anchor="middle" class="label">sex • rival • territory</text>

  <rect x="375" y="135" width="250" height="180" class="box" fill="#fef9c3"/>
  <text x="500" y="168" text-anchor="middle" class="smalltitle">MeA / BNST</text>
  <text x="500" y="200" text-anchor="middle" class="tiny">threat category</text>
  <text x="500" y="225" text-anchor="middle" class="tiny">sustained uncertainty</text>
  <text x="500" y="250" text-anchor="middle" class="tiny">social meaning</text>
  <text x="500" y="275" text-anchor="middle" class="tiny">routes to medial hypothalamus</text>

  <rect x="375" y="555" width="250" height="180" class="box" fill="#fef9c3"/>
  <text x="500" y="588" text-anchor="middle" class="smalltitle">MeA / BNST</text>
  <text x="500" y="620" text-anchor="middle" class="tiny">social identity</text>
  <text x="500" y="645" text-anchor="middle" class="tiny">sex and status</text>
  <text x="500" y="670" text-anchor="middle" class="tiny">intruder vs mate</text>
  <text x="500" y="695" text-anchor="middle" class="tiny">projection-specific routing</text>

  <rect x="720" y="115" width="270" height="250" class="box" fill="#dcfce7"/>
  <text x="855" y="149" text-anchor="middle" class="smalltitle">Predator-defense path</text>
  <rect x="750" y="180" width="210" height="72" class="subbox" fill="#f0fdf4"/>
  <text x="855" y="208" text-anchor="middle" class="label">VMHdm/c</text>
  <text x="855" y="231" text-anchor="middle" class="tiny">SF1+ defensive state</text>
  <rect x="750" y="272" width="210" height="68" class="subbox" fill="#f0fdf4"/>
  <text x="855" y="300" text-anchor="middle" class="label">PMd / AHN</text>
  <text x="855" y="322" text-anchor="middle" class="tiny">descending defense route</text>

  <rect x="720" y="535" width="270" height="250" class="box" fill="#dcfce7"/>
  <text x="855" y="569" text-anchor="middle" class="smalltitle">Conspecific-aggression path</text>
  <rect x="750" y="600" width="210" height="78" class="subbox" fill="#f0fdf4"/>
  <text x="855" y="628" text-anchor="middle" class="label">VMHvl</text>
  <text x="855" y="651" text-anchor="middle" class="tiny">Esr1+ / PR+ populations</text>
  <rect x="750" y="698" width="210" height="62" class="subbox" fill="#f0fdf4"/>
  <text x="855" y="725" text-anchor="middle" class="label">attack probability</text>
  <text x="855" y="746" text-anchor="middle" class="tiny">graded social state</text>

  <rect x="1115" y="170" width="260" height="210" class="box" fill="#fee2e2"/>
  <text x="1245" y="204" text-anchor="middle" class="smalltitle">PAG defensive columns</text>
  <rect x="1140" y="235" width="210" height="48" class="subbox" fill="#fff1f2"/>
  <text x="1245" y="265" text-anchor="middle" class="label">freeze / risk assessment</text>
  <rect x="1140" y="295" width="210" height="48" class="subbox" fill="#fff1f2"/>
  <text x="1245" y="325" text-anchor="middle" class="label">flight / escape</text>

  <rect x="1115" y="560" width="260" height="210" class="box" fill="#fee2e2"/>
  <text x="1245" y="594" text-anchor="middle" class="smalltitle">lPAG attack channel</text>
  <rect x="1140" y="625" width="210" height="48" class="subbox" fill="#fff1f2"/>
  <text x="1245" y="655" text-anchor="middle" class="label">threat display</text>
  <rect x="1140" y="685" width="210" height="48" class="subbox" fill="#fff1f2"/>
  <text x="1245" y="715" text-anchor="middle" class="label">bite / attack pattern</text>

  <rect x="720" y="820" width="270" height="80" class="box" fill="#ffedd5"/>
  <text x="855" y="850" text-anchor="middle" class="smalltitle">VTA / nucleus accumbens</text>
  <text x="855" y="876" text-anchor="middle" class="tiny">approach value • aggression seeking</text>

  <rect x="355" y="805" width="290" height="90" class="box" fill="#f1f5f9"/>
  <text x="500" y="836" text-anchor="middle" class="smalltitle">Contextual control</text>
  <text x="500" y="862" text-anchor="middle" class="tiny">hippocampus • prefrontal / OFC</text>
  <text x="500" y="884" text-anchor="middle" class="tiny">learned safety • consequences</text>

  <rect x="700" y="405" width="310" height="90" class="box" fill="#ffffff"/>
  <text x="855" y="436" text-anchor="middle" class="smalltitle">State-setting signals</text>
  <text x="855" y="462" text-anchor="middle" class="tiny">gonadal hormones • glucocorticoids</text>
  <text x="855" y="482" text-anchor="middle" class="tiny">energy state • prior win/defeat</text>

  <rect x="385" y="390" width="230" height="72" class="box" fill="#fee2e2"/>
  <text x="500" y="420" text-anchor="middle" class="smalltitle">Lateral septum</text>
  <text x="500" y="446" text-anchor="middle" class="tiny">GABA brake on attack</text>

  <path class="arrow" d="M 305 230 C 335 230, 345 225, 375 225"/>
  <path class="arrow" d="M 305 650 C 335 650, 345 645, 375 645"/>
  <path class="arrow" d="M 625 225 C 665 225, 680 215, 720 215"/>
  <path class="arrow" d="M 625 645 C 665 645, 680 640, 720 640"/>
  <path class="arrowgreen" d="M 960 215 C 1015 215, 1055 258, 1115 258"/>
  <path class="arrowgreen" d="M 960 306 C 1015 306, 1055 318, 1115 318"/>
  <path class="arrowgreen" d="M 960 640 C 1020 640, 1055 648, 1115 648"/>
  <path class="arrowgreen" d="M 960 730 C 1020 730, 1055 708, 1115 708"/>

  <path class="inhib" d="M 615 426 C 665 426, 700 620, 750 640"/>

  <path class="arrow dash fine" d="M 855 495 L 855 535"/>
  <path class="arrow dash fine" d="M 795 405 C 775 360, 775 290, 750 225"/>
  <path class="arrow dash fine" d="M 795 495 C 775 530, 770 570, 770 600"/>
  <path class="arrow dash fine" d="M 645 850 C 670 780, 690 700, 750 660"/>
  <path class="arrow dash fine" d="M 645 830 C 680 690, 690 310, 750 225"/>
  <path class="arrow dash" d="M 855 785 L 855 820"/>
  <path class="arrow dash" d="M 990 860 C 1110 830, 1185 775, 1245 770"/>

  <text x="635" y="405" class="tiny" fill="#b91c1c">inhibitory brake</text>
  <text x="1010" y="198" class="tiny" fill="#047857">descending output</text>
  <text x="1010" y="622" class="tiny" fill="#047857">action transformation</text>

  <rect x="1140" y="835" width="270" height="58" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="1275" y="858" text-anchor="middle" class="label">Key idea</text>
  <text x="1275" y="881" text-anchor="middle" class="tiny">VMH biases survival mode; PAG patterns the action.</text>
</svg>
