<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
<title id="title">Exploration as predictive affordance discovery</title>
<desc id="desc">Body state and novelty signals converge on hypothalamic and adjacent diencephalic circuits, with zona incerta highlighted as the clearest causal novelty-investigation node.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker></defs>
<rect width="1800" height="1120" fill="#fbfbf7"/>
<text x="900.0" y="48" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="900.0" dy="0">Exploration as predictive affordance discovery</tspan>
</text>
<text x="900.0" y="82" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="17" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="900.0" dy="0">A regulated body samples the world so later hunger, thirst, defense, thermoregulation, and social behavior use a better map.</tspan>
</text>
<rect x="55" y="125" width="345" height="275" rx="24" fill="#fff1d6" stroke="#d97706" stroke-width="2"/>
<text x="79" y="159" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="79" dy="0">Body-state inputs</tspan>
</text>
<text x="83" y="201" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• energy reserve and hunger</tspan>
</text>
<text x="83" y="226" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• hydration / salt / volume</tspan>
</text>
<text x="83" y="251" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• thermal comfort</tspan>
</text>
<text x="83" y="276" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• sleep-wake state</tspan>
</text>
<text x="83" y="301" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• pain, sickness, stress</tspan>
</text>
<rect x="55" y="495" width="345" height="285" rx="24" fill="#eee7ff" stroke="#7c3aed" stroke-width="2"/>
<text x="79" y="529" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="79" dy="0">Environmental inputs</tspan>
</text>
<text x="83" y="571" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• novel objects and routes</tspan>
</text>
<text x="83" y="596" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• unfamiliar conspecifics</tspan>
</text>
<text x="83" y="621" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• uncertainty and mismatch</tspan>
</text>
<text x="83" y="646" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• learned safety / danger cues</tspan>
</text>
<text x="83" y="671" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="83" dy="0">• food, water, shelter cues</tspan>
</text>
<rect x="465" y="150" width="360" height="585" rx="24" fill="#e8f0ff" stroke="#2563eb" stroke-width="2"/>
<text x="489" y="184" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="489" dy="0">Routes and relays</tspan>
</text>
<text x="493" y="226" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="493" dy="0">• endocrine / blood access: ARC,</tspan>
<tspan x="509" dy="19">median eminence, CVO-related</tspan>
<tspan x="509" dy="19">pathways</tspan>
</text>
<text x="493" y="289" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="493" dy="0">• vagus → NTS, area postrema,</tspan>
<tspan x="509" dy="19">parabrachial</tspan>
</text>
<text x="493" y="333" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="493" dy="0">• spinal pain and thermal relays</tspan>
</text>
<text x="493" y="358" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="493" dy="0">• prelimbic and temporal cortex</tspan>
<tspan x="509" dy="19">to ZI</tspan>
</text>
<text x="493" y="402" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="493" dy="0">• hippocampal context; amygdala /</tspan>
<tspan x="509" dy="19">BNST / PAG safety loops</tspan>
</text>
<rect x="900" y="135" width="420" height="625" rx="28" fill="#eaf7ec" stroke="#16a34a" stroke-width="2"/>
<text x="1110" y="170" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="1110" dy="0">Diencephalic gates</tspan>
</text>
<rect x="940" y="205" width="340" height="95" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="1110.0" y="237" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="1110.0" dy="0">medial ZI</tspan>
</text>
<text x="1110.0" y="269" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1110.0" dy="0">directed novelty investigation</tspan>
</text>
<text x="1110.0" y="289" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1110.0" dy="0">strongest causal evidence</tspan>
</text>
<rect x="940" y="325" width="340" height="90" rx="18" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
<text x="1110.0" y="357" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="1110.0" dy="0">SuM</tspan>
</text>
<text x="1110.0" y="389" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1110.0" dy="0">hypothalamic novelty to</tspan>
<tspan x="1110.0" dy="18">hippocampus</tspan>
</text>
<rect x="940" y="440" width="340" height="90" rx="18" fill="#eaf7ec" stroke="#16a34a" stroke-width="2"/>
<text x="1110.0" y="472" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="1110.0" dy="0">LH / orexin</tspan>
</text>
<text x="1110.0" y="504" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1110.0" dy="0">wakeful arousal and energetic</tspan>
<tspan x="1110.0" dy="18">support</tspan>
</text>
<rect x="940" y="555" width="340" height="80" rx="18" fill="#eaf7ec" stroke="#16a34a" stroke-width="2"/>
<text x="1110.0" y="587" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="1110.0" dy="0">VMH / SF1</tspan>
</text>
<text x="1110.0" y="619" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1110.0" dy="0">mode competition; metabolic budget</tspan>
</text>
<rect x="940" y="650" width="340" height="80" rx="18" fill="#eaf7ec" stroke="#16a34a" stroke-width="2"/>
<text x="1110.0" y="682" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="16" font-weight="800" fill="#0f172a" text-anchor="middle">
<tspan x="1110.0" dy="0">ARC / PVN / POA / SCN</tspan>
</text>
<text x="1110.0" y="714" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#475569" text-anchor="middle">
<tspan x="1110.0" dy="0">energy, stress, thermal, circadian</tspan>
<tspan x="1110.0" dy="18">gates</tspan>
</text>
<rect x="1390" y="130" width="360" height="330" rx="24" fill="#fff4cc" stroke="#d97706" stroke-width="2"/>
<text x="1414" y="164" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="1414" dy="0">Outputs to body and behavior</tspan>
</text>
<text x="1418" y="206" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• directed investigation: sniff,</tspan>
<tspan x="1434" dy="19">bite, grab, gaze</tspan>
</text>
<text x="1418" y="250" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• focused exploration vs wall-</tspan>
<tspan x="1434" dy="19">hugging</tspan>
</text>
<text x="1418" y="294" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• locomotion, orienting, pause /</tspan>
<tspan x="1434" dy="19">approach / retreat</tspan>
</text>
<text x="1418" y="338" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• autonomic support for movement</tspan>
</text>
<text x="1418" y="363" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• limited analgesia / anxiolysis</tspan>
<tspan x="1434" dy="19">when useful</tspan>
</text>
<rect x="1390" y="555" width="360" height="245" rx="24" fill="#f6e7f8" stroke="#9333ea" stroke-width="2"/>
<text x="1414" y="589" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="1414" dy="0">Upward projections bias</tspan>
<tspan x="1414" dy="24">behavior</tspan>
</text>
<text x="1418" y="631" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• hippocampus and cortex</tspan>
</text>
<text x="1418" y="656" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• VTA, nucleus accumbens, dorsal</tspan>
<tspan x="1434" dy="19">striatum</tspan>
</text>
<text x="1418" y="700" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• amygdala, BNST, thalamus</tspan>
</text>
<text x="1418" y="725" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" fill="#475569" text-anchor="start">
<tspan x="1418" dy="0">• PAG and superior colliculus</tspan>
</text>
<rect x="555" y="875" width="690" height="135" rx="24" fill="#e6fffb" stroke="#0f766e" stroke-width="2"/>
<text x="579" y="909" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a" text-anchor="start">
<tspan x="579" dy="0">Updated affordance map</tspan>
</text>
<text x="583" y="951" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="16" fill="#475569" text-anchor="start">
<tspan x="583" dy="0">• food, water, shelter, escape routes, social partners, thermal refuges, safe</tspan>
<tspan x="599" dy="19">paths, danger zones</tspan>
</text>
<line x1="400" y1="260" x2="465" y2="350" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="400" y1="635" x2="465" y2="535" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="825" y1="430" x2="900" y2="430" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1320" y1="360" x2="1390" y2="290" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1320" y1="510" x2="1390" y2="675" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1570" y1="460" x2="1570" y2="555" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1110" y1="760" x2="990" y2="875" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1570" y1="800" x2="1230" y2="875" stroke="#475569" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="900" y="1048" font-family="Aptos, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#475569" text-anchor="middle">
<tspan x="900" dy="0">The updated map feeds back into later predictions and learned safety / danger cues.</tspan>
</text>
</svg>