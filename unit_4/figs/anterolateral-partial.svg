<svg viewBox="0 0 1060 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2E8B2E"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1060" height="560" fill="#FAF9F5"/>

  <!-- Midline (marks the spinal decussation) -->
  <line x1="430" y1="50" x2="430" y2="545" stroke="#C8C8D0" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="200" y="42" text-anchor="middle" fill="#8A8A9A" font-size="13" font-weight="bold">Ipsilateral</text>
  <text x="750" y="42" text-anchor="middle" fill="#8A8A9A" font-size="13" font-weight="bold">Contralateral</text>

  <!-- Stream headers -->
  <text x="570" y="62" text-anchor="middle" fill="#4A4A4A" font-size="11" font-weight="bold">Sensory-discriminative</text>
  <text x="760" y="62" text-anchor="middle" fill="#4A4A4A" font-size="11" font-weight="bold">Interoceptive</text>
  <text x="930" y="62" text-anchor="middle" fill="#4A4A4A" font-size="11" font-weight="bold">Affective</text>

  <!-- EDGES -->
  <line x1="240" y1="485" x2="240" y2="454" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="240" y1="406" x2="240" y2="371" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Ascending trunk to VPL -->
  <path d="M 345 345 L 570 345 L 570 241" fill="none" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Branch to VMpo -->
  <path d="M 570 300 L 760 300 L 760 241" fill="none" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Branch to medial / intralaminar -->
  <path d="M 570 300 L 930 300 L 930 241" fill="none" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Thalamocortical -->
  <line x1="570" y1="189" x2="570" y2="126" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="760" y1="189" x2="760" y2="126" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <line x1="930" y1="189" x2="930" y2="126" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- NODES -->
  <ellipse cx="240" cy="515" rx="118" ry="30" fill="#FFFFFF" stroke="#B8B8C0" stroke-width="1.5"/>
  <text x="240" y="510" text-anchor="middle" fill="#2A2A2A" font-size="15">Free nerve endings</text>
  <text x="240" y="527" text-anchor="middle" fill="#2A2A2A" font-size="10">(nociceptors &#183; thermoreceptors)</text>

  <rect x="145" y="406" width="190" height="48" rx="8" fill="#7A6ED0"/>
  <text x="240" y="428" text-anchor="middle" fill="#FFFFFF" font-size="15">Dorsal root ganglion</text>
  <text x="240" y="444" text-anchor="middle" fill="#EDEAF8" font-size="11">1st-order cell body</text>

  <rect x="135" y="319" width="210" height="52" rx="8" fill="#4F71B8"/>
  <text x="240" y="339" text-anchor="middle" fill="#FFFFFF" font-size="15">Spinal dorsal horn</text>
  <text x="240" y="355" text-anchor="middle" fill="#E6EEF8" font-size="10">laminae I, II, V &#8212; 2nd-order</text>

  <!-- Thalamic nuclei -->
  <rect x="495" y="189" width="150" height="52" rx="8" fill="#D0D0D6" stroke="#B8B8C0" stroke-width="1.5"/>
  <text x="570" y="209" text-anchor="middle" fill="#2A2A2A" font-size="15">VPL thalamus</text>
  <text x="570" y="225" text-anchor="middle" fill="#555555" font-size="11">(deep dorsal horn)</text>

  <rect x="685" y="189" width="150" height="52" rx="8" fill="#D0D0D6" stroke="#B8B8C0" stroke-width="1.5"/>
  <text x="760" y="209" text-anchor="middle" fill="#2A2A2A" font-size="15">VMpo</text>
  <text x="760" y="225" text-anchor="middle" fill="#555555" font-size="10">post. ventromedial n.</text>

  <rect x="845" y="189" width="170" height="52" rx="8" fill="#D0D0D6" stroke="#B8B8C0" stroke-width="1.5"/>
  <text x="930" y="208" text-anchor="middle" fill="#2A2A2A" font-size="13">Medial / intralaminar</text>
  <text x="930" y="224" text-anchor="middle" fill="#555555" font-size="11">thalamic nuclei</text>

  <!-- Cortex -->
  <rect x="495" y="74" width="150" height="52" rx="8" fill="#B0413E"/>
  <text x="570" y="96" text-anchor="middle" fill="#FFFFFF" font-size="16">S1</text>
  <text x="570" y="112" text-anchor="middle" fill="#F2D6D4" font-size="11">postcentral gyrus</text>

  <rect x="685" y="74" width="150" height="52" rx="8" fill="#B0413E"/>
  <text x="760" y="96" text-anchor="middle" fill="#FFFFFF" font-size="15">Insular cortex</text>
  <text x="760" y="112" text-anchor="middle" fill="#F2D6D4" font-size="10">dorsal posterior</text>

  <rect x="845" y="74" width="170" height="52" rx="8" fill="#B0413E"/>
  <text x="930" y="96" text-anchor="middle" fill="#FFFFFF" font-size="15">Anterior cingulate</text>
  <text x="930" y="112" text-anchor="middle" fill="#F2D6D4" font-size="10">ACC</text>

  <!-- ANNOTATIONS -->
  <text x="447" y="305" fill="#2A2A2A" font-size="13" font-weight="bold">Anterolateral system</text>
  <text x="447" y="321" fill="#2A2A2A" font-size="11">(spinothalamic tract)</text>
  <text x="360" y="368" fill="#2A2A2A" font-size="13" font-weight="bold">Crosses in the cord</text>
  <text x="360" y="383" fill="#2A2A2A" font-size="11">(anterior white commissure)</text>
</svg>