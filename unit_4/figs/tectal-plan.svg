<svg viewBox="0 0 956 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2E8B2E"/>
    </marker>
  </defs>

  <!-- Off-white background -->
  <rect x="0" y="0" width="956" height="560" fill="#FAF9F5"/>

  <!-- ================= EDGES (drawn first, under boxes) ================= -->

  <!-- Visual (retina) -> Superior colliculus (superficial, retinorecipient) -->
  <line x1="175" y1="489" x2="300" y2="286" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Auditory (cochlea) -> Inferior colliculus -->
  <line x1="380" y1="489" x2="380" y2="412" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Inferior colliculus -> Superior colliculus (deep, audiovisual integration) -->
  <line x1="380" y1="368" x2="380" y2="286" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Somatosensory -> Superior colliculus (deep) -->
  <line x1="585" y1="489" x2="460" y2="286" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- SC -> Eye movements -->
  <line x1="310" y1="210" x2="285" y2="131" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- SC -> Head/body orienting -->
  <line x1="350" y1="210" x2="285" y2="64" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- SC -> Pulvinar (extrageniculate branch) -->
  <line x1="490" y1="250" x2="590" y2="250" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- Pulvinar -> Extrastriate cortex -->
  <line x1="720" y1="240" x2="790" y2="194" stroke="#2E8B2E" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <!-- ================= NODES ================= -->

  <!-- Sensory inputs (white ellipses = sensory origin) -->
  <ellipse cx="175" cy="515" rx="64" ry="26" fill="#FFFFFF" stroke="#B8B8C0" stroke-width="1.5"/>
  <text x="175" y="520" text-anchor="middle" fill="#2A2A2A" font-size="16">Visual (retina)</text>

  <ellipse cx="380" cy="515" rx="64" ry="26" fill="#FFFFFF" stroke="#B8B8C0" stroke-width="1.5"/>
  <text x="380" y="520" text-anchor="middle" fill="#2A2A2A" font-size="16">Auditory (cochlea)</text>

  <ellipse cx="585" cy="515" rx="64" ry="26" fill="#FFFFFF" stroke="#B8B8C0" stroke-width="1.5"/>
  <text x="585" y="520" text-anchor="middle" fill="#2A2A2A" font-size="16">Somatosensory</text>

  <!-- Inferior colliculus (midbrain roof, auditory) -->
  <rect x="290" y="368" width="180" height="44" rx="8" fill="#9A7220" stroke="#6E5010" stroke-width="1.5"/>
  <text x="380" y="395" text-anchor="middle" fill="#FFFFFF" font-size="16">Inferior colliculus</text>

  <!-- Superior colliculus (midbrain roof, hero structure) -->
  <rect x="270" y="210" width="220" height="76" rx="8" fill="#9A7220" stroke="#6E5010" stroke-width="1.5"/>
  <text x="380" y="245" text-anchor="middle" fill="#FFFFFF" font-size="18">Superior colliculus</text>
  <text x="380" y="267" text-anchor="middle" fill="#F0E0C0" font-size="13">spatially registered maps</text>

  <!-- Orienting / motor output targets (green = downstream targets) -->
  <rect x="90" y="40" width="195" height="48" rx="8" fill="#4CAF50"/>
  <text x="187" y="62" text-anchor="middle" fill="#FFFFFF" font-size="15">Head/body orienting</text>
  <text x="187" y="79" text-anchor="middle" fill="#EAF6EA" font-size="11">(tectospinal)</text>

  <rect x="90" y="110" width="195" height="42" rx="8" fill="#4CAF50"/>
  <text x="187" y="136" text-anchor="middle" fill="#FFFFFF" font-size="15">Eye movements (gaze)</text>

  <!-- Pulvinar (gray = thalamic nucleus) -->
  <rect x="590" y="228" width="130" height="44" rx="8" fill="#D0D0D6" stroke="#B8B8C0" stroke-width="1.5"/>
  <text x="655" y="255" text-anchor="middle" fill="#2A2A2A" font-size="16">Pulvinar</text>

  <!-- Extrastriate cortex (red-brown = cortex) -->
  <rect x="790" y="150" width="155" height="44" rx="8" fill="#B0413E"/>
  <text x="867" y="176" text-anchor="middle" fill="#FFFFFF" font-size="15">Extrastriate cortex</text>

  <!-- ================= ANNOTATIONS ================= -->
  <text x="90" y="26" fill="#2A2A2A" font-size="14" font-weight="bold">Orienting / motor output</text>
  <text x="95" y="332" fill="#2A2A2A" font-size="14" font-weight="bold">Midbrain roof (tectum)</text>
  <text x="680" y="505" fill="#2A2A2A" font-size="14" font-weight="bold">Multiple modalities converge</text>
  <text x="560" y="200" fill="#2A2A2A" font-size="13">Bypasses geniculate relay</text>
</svg>
